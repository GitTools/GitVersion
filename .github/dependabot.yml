version: 2
updates:
  - package-ecosystem: dotnet-sdk
    milestone: 82 # Corresponds to 6.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(sdk)"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
  - package-ecosystem: nuget
    milestone: 82 # Corresponds to 6.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(deps)"
    groups:
      microsoft:
        group-by: dependency-name
        patterns:
          - "Microsoft.*"
          - "System.*"
      Microsoft_CodeAnalysis:
        group-by: dependency-name
        patterns:
          - "Microsoft.CodeAnalysis.*"
      analyzers:
        group-by: dependency-name
        patterns:
          - "*Analyzers"
      serilog:
        group-by: dependency-name
        patterns:
          - "Serilog.*"
      nunit:
        group-by: dependency-name
        patterns:
          - "NUnit.*"
      LibGit2Sharp:
        group-by: dependency-name
        patterns:
          - "LibGit2Sharp.*"
      JsonSchemaNet:
        group-by: dependency-name
        patterns:
          - "JsonSchemaNet.*"
    directories:
      - /build
      - /new-cli
      - /src
      - /build/artifacts
      - /build/build
      - /build/common
      - /build/config
      - /build/docker
      - /build/docs
      - /build/publish
      - /build/release
      - /new-cli/GitVersion.Calculation
      - /new-cli/GitVersion.Cli.Generator.Tests
      - /new-cli/GitVersion.Cli.Generator
      - /new-cli/GitVersion.Cli
      - /new-cli/GitVersion.Common.Command
      - /new-cli/GitVersion.Common
      - /new-cli/GitVersion.Configuration
      - /new-cli/GitVersion.Core.Libgit2Sharp
      - /new-cli/GitVersion.Core.Tester
      - /new-cli/GitVersion.Core
      - /new-cli/GitVersion.Normalization
      - /new-cli/GitVersion.Output
      - /src/GitVersion.App.Tests
      - /src/GitVersion.App
      - /src/GitVersion.BuildAgents.Tests
      - /src/GitVersion.BuildAgents
      - /src/GitVersion.Configuration.Tests
      - /src/GitVersion.Configuration
      - /src/GitVersion.Core.Tests
      - /src/GitVersion.Core
      - /src/GitVersion.LibGit2Sharp
      - /src/GitVersion.MsBuild.Tests
      - /src/GitVersion.MsBuild
      - /src/GitVersion.Output.Tests
      - /src/GitVersion.Output
      - /src/GitVersion.Schema
      - /src/GitVersion.Testing
      - /tests/integration
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    labels:
      - "dependencies"
    commit-message:
      prefix: "(build deps)"
    groups:
      actions:
        patterns:
          - "actions/*"
    directories:
      - /.github/workflows
      - /.github/actions
      - /
    schedule:
      interval: cron
      cronjob: "0 12 * * *"

  - package-ecosystem: npm
    labels:
      - "dependencies"
    commit-message:
      prefix: "(docs deps)"
    groups:
      remark:
        patterns:
          - "remark*"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 1,15 * *"

  - package-ecosystem: docker
    directory: /.devcontainer
    schedule:
      interval: daily

  - package-ecosystem: docker
    directory: /build/docker
    schedule:
      interval: daily
