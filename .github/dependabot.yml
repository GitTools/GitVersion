version: 2
updates:
  - package-ecosystem: dotnet-sdk
    milestone: 82 # Corresponds to 6.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(sdk)"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
  - package-ecosystem: nuget
    milestone: 82 # Corresponds to 6.x
    labels:
      - "dependencies"
    commit-message:
      prefix: "(deps)"
    groups:
      microsoft:
        group-by: dependency-name
        patterns:
          - "Microsoft.*"
          - "System.*"
      Microsoft_CodeAnalysis:
        group-by: dependency-name
        patterns:
          - "Microsoft.CodeAnalysis.*"
      analyzers:
        group-by: dependency-name
        patterns:
          - "*Analyzers"
      serilog:
        group-by: dependency-name
        patterns:
          - "Serilog.*"
      nunit:
        group-by: dependency-name
        patterns:
          - "NUnit.*"
      LibGit2Sharp:
        group-by: dependency-name
        patterns:
          - "LibGit2Sharp.*"
      JsonSchemaNet:
        group-by: dependency-name
        patterns:
          - "JsonSchemaNet.*"
    # Central Package Management: all versions live in the Directory.Packages.props
    # at each of these roots, so Dependabot only needs to scan the roots.
    directories:
      - /build
      - /new-cli
      - /src
      - /tests/integration
    schedule:
      interval: cron
      cronjob: "0 12 * * *"
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    labels:
      - "dependencies"
    commit-message:
      prefix: "(build deps)"
    groups:
      actions:
        patterns:
          - "actions/*"
      docker:
        patterns:
          - "docker/*"
      codeql:
        patterns:
          - "github/codeql-action/*"
      reviewdog:
        patterns:
          - "reviewdog/*"
      gittools:
        patterns:
          - "gittools/*"
    directories:
      - /.github/workflows
      - /.github/actions
    schedule:
      interval: cron
      cronjob: "0 12 * * *"

  - package-ecosystem: npm
    labels:
      - "dependencies"
    commit-message:
      prefix: "(docs deps)"
    groups:
      remark:
        patterns:
          - "remark*"
    directory: "/"
    schedule:
      interval: cron
      cronjob: "0 12 1,15 * *"

  - package-ecosystem: docker
    labels:
      - "dependencies"
    commit-message:
      prefix: "(docker deps)"
    groups:
      docker:
        patterns:
          - "*"
    directories:
      - /.devcontainer
      - /build/docker
    schedule:
      interval: daily

  - package-ecosystem: devcontainers
    labels:
      - "dependencies"
    commit-message:
      prefix: "(devcontainer deps)"
    groups:
      devcontainers:
        patterns:
          - "*"
    directory: "/"
    schedule:
      interval: daily
