name: Verify & Publish Docs

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ publish-release ]
  push:
    branches:
      - main
    paths:
      - docs/**
      - package*.json
      - markdownlint.json
      - .remarkrc.yaml
      - mkdocs.yml
      - .github/workflows/docs.yml
  pull_request:
    branches:
      - main
    paths:
      - docs/**
      - package*.json
      - markdownlint.json
      - .remarkrc.yaml
      - mkdocs.yml
      - .github/workflows/docs.yml
env:
  DOTNET_ROLL_FORWARD: "Major"
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: 1

jobs:
  prepare:
    name: Prepare Build
    runs-on: ubuntu-24.04

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache cake frosting
        id: cache-cake
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: run
          key: run-${{ runner.os }}-${{ hashFiles('./build/**') }}

      - name: Use cached tools
        id: cache-tools
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tools
          key: tools-${{ runner.os }}-${{ hashFiles('./build/**') }}

      - name: Get npm cache directory
        shell: bash
        id: cache-node-dir
        run: |
          cacheDir=$(npm config get cache)
          echo "dir=$cacheDir" >> $GITHUB_OUTPUT

      - name: Cache Node Modules
        id: cache-node
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.cache-node-dir.outputs.dir }}
          key: node-${{ runner.os }}-${{ hashFiles('./package-lock.json') }}
          restore-keys: node-${{ runner.os }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: '[Build]'
        if: steps.cache-cake.outputs.cache-hit != 'true'
        run: dotnet build build/ --configuration=Release

      - name: '[Prepare]'
        shell: pwsh
        run: dotnet run/build.dll --target=BuildPrepare

  validate:
    name: Validates Html
    needs: [ prepare ]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Restore State
        uses: ./.github/actions/cache-restore

      - name: '[Build Documentation]'
        shell: pwsh
        run: dotnet run/docs.dll --target=BuildDocs

      - name: '[HTMLProofer]'
        uses: chabad360/htmlproofer@a1a3419200cea0e832a5c6249647d1d271178e82 # master
        with:
          directory: ./artifacts/docs/preview
          arguments: --ignore-urls /api/,/docs/,/5.12.0/ --allow-hash-href --allow-missing-href --assume-extension --disable-external --no-check_external_hash

      - name: '[Reviewdog Reporter]'
        id: reporter
        run: |
          value=$([ ${{ github.event_name == 'pull_request' }} ] && echo "github-pr-review" || echo "github-check")
          echo "value=$value" >> $GITHUB_OUTPUT

      - name: '[Remark Lint]'
        uses: reviewdog/action-remark-lint@82225f7db5b4a3caaca3052733b6800fa7d109b0 # v5.18.0
        with:
          github_token: ${{ github.token }}
          reporter: ${{ steps.reporter.outputs.value }}

  publish:
    if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
    name: Publish docs
    needs: [ validate ]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_USERNAME: ${{ github.actor }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Restore State
        uses: ./.github/actions/cache-restore

      - name: '[Build Schemas]'
        shell: pwsh
        run: dotnet run/docs.dll --target=GenerateSchemas

      - name: '[Publish Documentation]'
        if: github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: dotnet run/docs.dll --target=PublishDocs --force
