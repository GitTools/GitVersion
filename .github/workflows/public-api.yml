name: Mark public API as shipped

on:
  workflow_dispatch:
  repository_dispatch:
    types: [ publish-release ]

defaults:
  run:
    shell: pwsh

jobs:
  public-api:
    name: Mark public API as shipped
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: gittools/cicd/checkout@824c3d773fb5d1b00c26b474ae88b7ce9ae555ee # v5
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          fetch-depth: 0

      - name: Mark public API as shipped
        run: ./src/mark-shipped.ps1

      - name: Commit and push changes
        uses: gittools/cicd/git-commit-push@824c3d773fb5d1b00c26b474ae88b7ce9ae555ee # v5
        with:
          message: "include public API changes"
