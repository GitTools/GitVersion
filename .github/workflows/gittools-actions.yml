name: Update GitTools Actions

on:
  workflow_dispatch:
    inputs:
      tag-name:
        description: 'Tag name to use for the release'
        required: true
  repository_dispatch:
    types: [ publish-release ]

defaults:
  run:
    shell: pwsh

permissions:
  contents: read

jobs:
  homebrew:
    permissions:
      contents: none
    name: Update GitTools Actions
    runs-on: ubuntu-24.04
    steps:
      - name: Get version
        id: get-version
        shell: pwsh
        run: |
          $version = "${{ github.event.client_payload.tag }}"
          if ($version -eq "") {
            $version = "${{ github.event.inputs.tag-name }}"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Load GitHub App credentials
        id: github-app-creds
        uses: gittools/cicd/github-app-creds@v1
        with:
          op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ steps.github-app-creds.outputs.gh_app_id }}
          private-key: ${{ steps.github-app-creds.outputs.gh_app_private_key }}
          owner: ${{ github.repository_owner }}
          repositories: actions
          permission-contents: write

      - uses: peter-evans/repository-dispatch@v4
        name: Update GitTools Actions
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ github.repository_owner }}/actions
          event-type: gitversion-release-published
          client-payload: |
            {
              "ref": "${{ github.ref }}",
              "sha": "${{ github.sha }}",
              "newTag": "${{ steps.get-version.outputs.version }}"
            }
