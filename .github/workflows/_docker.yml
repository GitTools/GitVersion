on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      arch:
        required: true
        type: string
      docker_distros:
        required: true
        type: string
      dotnet_versions:
        required: true
        type: string
      publish_images:
        required: true
        type: boolean

env:
  DOTNET_INSTALL_DIR: "./.dotnet"
  DOTNET_ROLL_FORWARD: "Major"

permissions:
  packages: write

jobs:
  docker:
    name: ${{ matrix.docker_distro }} - net${{ matrix.dotnet_version }}
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        docker_distro: ${{ fromJson(inputs.docker_distros) }}
        dotnet_version: ${{ fromJson(inputs.dotnet_versions) }}
    steps:
    -
      name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    -
      name: Restore State
      uses: ./.github/actions/cache-restore
    -
      uses: actions/download-artifact@v8
      name: Download nuget packages
      with:
        name: nuget
        path: ${{ github.workspace }}/artifacts/packages/nuget
    -
      name: Set up Docker
      uses: ./.github/actions/docker-setup
    -
      name: Docker Test
      if: success() && inputs.publish_images == false
      uses: ./.github/actions/docker-test
      with:
        arch: ${{ inputs.arch }}
        docker_distro: ${{ matrix.docker_distro }}
        dotnet_version: ${{ matrix.dotnet_version }}
    -
      name: Load DockerHub credentials
      id: dockerhub-creds
      if: success() && inputs.publish_images
      uses: gittools/cicd/dockerhub-creds@v1
      with:
        op_service_account_token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    -
      name: Docker Publish
      if: success() && inputs.publish_images
      uses: ./.github/actions/docker-publish
      with:
        arch: ${{ inputs.arch }}
        docker_distro: ${{ matrix.docker_distro }}
        dotnet_version: ${{ matrix.dotnet_version }}
        docker_registry_username: ${{ steps.dockerhub-creds.outputs.docker_username }}
        docker_registry_password: ${{ steps.dockerhub-creds.outputs.docker_password }}
        github_registry_username: ${{ github.repository_owner }}
        github_registry_password: ${{ github.token }}
